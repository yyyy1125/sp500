<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>量化预测终端 - 标普500分钟线示波器</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background-color: #111;
            border-bottom: 2px solid #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            text-transform: uppercase;
        }
        .sys-title { color: #a0a0a0; font-weight: bold; letter-spacing: 2px; }
        .status-indicator { display: flex; align-items: center; gap: 10px; }
        .led {
            width: 12px; height: 12px; border-radius: 50%;
            background-color: #ff3333;
            box-shadow: 0 0 8px #ff3333;
            transition: background-color 0.3s;
        }
        .led.online { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .main-container { display: flex; flex: 1; padding: 15px; gap: 15px; }
        .oscilloscope-panel {
            flex: 3; background-color: #0a0a0a; border: 1px solid #333;
            position: relative; border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        .telemetry-panel {
            flex: 1; background-color: #111; border: 1px solid #333;
            border-radius: 4px; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .data-block {
            background: #1a1a1a;
            border-left: 4px solid #555;
            padding: 15px;
            border-radius: 2px;
        }
        .data-block.ch1 { border-left-color: #00ffff; }
        .data-block.ch2 { border-left-color: #ff00ff; }
        .data-block.alert { border-left-color: #ffaa00; }
        .data-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .data-value {
            font-size: 28px; font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }
        .data-value.ch1-text { color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.4); }
        .data-value.ch2-text { color: #ff00ff; text-shadow: 0 0 8px rgba(255,0,255,0.4); }
        .data-value.alert-text { color: #ffaa00; }
        svg { width: 100%; height: 100%; display: block; }
        .grid line { stroke: #1a1a1a; stroke-width: 1px; }
        .grid path { stroke-width: 0; }
        .axis text { fill: #555; font-size: 10px; font-family: monospace; }
        .axis path, .axis line { stroke: #333; }
        .line-ch1 {
            fill: none; stroke: #00ffff; stroke-width: 2px;
            filter: drop-shadow(0 0 4px rgba(0,255,255,0.8));
        }
        .line-ch2 {
            fill: none; stroke: #ff00ff; stroke-width: 2px;
            stroke-dasharray: 4,4;
            filter: drop-shadow(0 0 4px rgba(255,0,255,0.8));
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="sys-title">Quant Oscilloscope // S&P500 Terminal</div>
        <div class="status-indicator">
            <span id="model-badge" style="color: #888;">MODEL: [WAITING]</span>
            <span>|</span>
            <span id="status-text" style="color: #ff3333;">SYS OFFLINE</span>
            <div id="led-bulb" class="led"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="oscilloscope-panel" id="chart-container"></div>
        <div class="telemetry-panel">
            <div class="data-block ch1">
                <div class="data-label">CH1: 真实收盘价 (S&P500 Raw)</div>
                <div class="data-value ch1-text" id="val-ch1">0.000</div>
            </div>
            <div class="data-block ch2">
                <div class="data-label">CH2: 模型预测价 (Predict)</div>
                <div class="data-value ch2-text" id="val-ch2">0.000</div>
            </div>
            <div class="data-block alert">
                <div class="data-label">Δ 绝对预测误差 (Price Error)</div>
                <div class="data-value alert-text" id="val-error">0.000</div>
            </div>
            <div class="data-block" style="border-left-color: #444;">
                <div class="data-label">SYS 推理延迟 (Latency)</div>
                <div class="data-value" id="val-latency" style="color: #ccc; font-size: 24px;">0 ms</div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById("chart-container");
        const MAX_POINTS = 200;
        let dataBuffer = [];
        const width = container.clientWidth;
        const height = container.clientHeight;
        const margin = {top: 20, right: 20, bottom: 20, left: 60};
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;

        const svg = d3.select("#chart-container").append("svg")
            .attr("width", width)
            .attr("height", height);
        const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const xScale = d3.scaleLinear().domain([0, MAX_POINTS - 1]).range([0, innerWidth]);
        const yScale = d3.scaleLinear().domain([95, 105]).range([innerHeight, 0]);

        g.append("g").attr("class", "grid")
            .call(d3.axisLeft(yScale).ticks(10).tickSize(-innerWidth).tickFormat(""));
        g.append("g").attr("class", "grid")
            .attr("transform", `translate(0,${innerHeight})`)
            .call(d3.axisBottom(xScale).ticks(20).tickSize(-innerHeight).tickFormat(""));
        g.append("g").attr("class", "axis").call(d3.axisLeft(yScale).ticks(5));

        const lineCh1 = d3.line().x((d, i) => xScale(i)).y(d => yScale(d.ch1_actual));
        const lineCh2 = d3.line().x((d, i) => xScale(i)).y(d => yScale(d.ch2_predict));
        const pathCh1 = g.append("path").attr("class", "line-ch1");
        const pathCh2 = g.append("path").attr("class", "line-ch2");

        const domCh1 = document.getElementById('val-ch1');
        const domCh2 = document.getElementById('val-ch2');
        const domError = document.getElementById('val-error');
        const domLatency = document.getElementById('val-latency');
        const domModelBadge = document.getElementById('model-badge');
        const domStatusText = document.getElementById('status-text');
        const domLed = document.getElementById('led-bulb');

        function connectDataStream() {
            const ws = new WebSocket("ws://127.0.0.1:8765");
            ws.onopen = () => {
                domStatusText.textContent = "DATA LINK ACTIVE";
                domStatusText.style.color = "#00ff00";
                domLed.classList.add("online");
            };
            ws.onmessage = (event) => {
                const payload = JSON.parse(event.data);
                domModelBadge.textContent = `MODEL: [ ${payload.model_type} ]`;
                domCh1.textContent = payload.ch1_actual.toFixed(3);
                domCh2.textContent = payload.ch2_predict.toFixed(3);
                domError.textContent = payload.error_abs.toFixed(4);
                domLatency.textContent = payload.latency_ms.toFixed(1) + " ms";

                dataBuffer.push(payload);
                if (dataBuffer.length > MAX_POINTS) {
                    dataBuffer.shift();
                }

                // 动态适配Y轴范围
                const allPrices = dataBuffer.flatMap(d => [d.ch1_actual, d.ch2_predict]);
                const yMin = Math.min(...allPrices) * 0.998;
                const yMax = Math.max(...allPrices) * 1.002;
                yScale.domain([yMin, yMax]);

                pathCh1.datum(dataBuffer).attr("d", lineCh1);
                pathCh2.datum(dataBuffer).attr("d", lineCh2);
            };
            ws.onclose = () => {
                domStatusText.textContent = "SYS OFFLINE";
                domStatusText.style.color = "#ff3333";
                domLed.classList.remove("online");
                setTimeout(connectDataStream, 3000);
            };
        }
        connectDataStream();
    </script>
</body>
</html>
